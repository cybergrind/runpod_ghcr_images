name: Build comfyui-cuda13

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/build-comfyui-cuda13.yml"
      - "images/comfyui-cuda13/**"
      - "README.md"
  workflow_dispatch:
    inputs:
      base_image:
        description: "Parent image used by the Dockerfile"
        required: false
        default: "runpod/comfyui:cuda13.0"

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}/comfyui-cuda13
  DEFAULT_BASE_IMAGE: runpod/comfyui:cuda13.0

jobs:
  build:
    name: Build and push image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set base image
        id: base
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.base_image }}" ]; then
            echo "image=${{ inputs.base_image }}" >> "$GITHUB_OUTPUT"
          else
            echo "image=${DEFAULT_BASE_IMAGE}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=sha,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: images/comfyui-cuda13
          file: images/comfyui-cuda13/Dockerfile
          push: true
          build-args: |
            BASE_IMAGE=${{ steps.base.outputs.image }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
