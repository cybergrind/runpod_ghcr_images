name: Build comfyui-cuda13

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/build-comfyui-cuda13.yml"
      - "images/comfyui-cuda13/**"
      - "README.md"
  workflow_dispatch:
    inputs:
      upstream_base_image:
        description: "Upstream (Docker Hub) base mirrored into GHCR"
        required: false
        default: "runpod/comfyui:cuda13.0"

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}/comfyui-cuda13
  # Upstream base on Docker Hub — pulled ONCE here and mirrored to GHCR.
  UPSTREAM_BASE_IMAGE: runpod/comfyui:cuda13.0
  # GHCR mirror of the upstream base. The Dockerfile builds FROM this, so the
  # image build pulls NOTHING from Docker Hub.
  GHCR_BASE_IMAGE: ghcr.io/${{ github.repository }}/comfyui-base:cuda13.0

jobs:
  build:
    name: Build and push image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve upstream base image
        id: base
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.upstream_base_image }}" ]; then
            echo "upstream=${{ inputs.upstream_base_image }}" >> "$GITHUB_OUTPUT"
          else
            echo "upstream=${UPSTREAM_BASE_IMAGE}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Authenticate to Docker Hub ONLY if creds are provided as repo secrets.
      # Authenticated pulls have a far higher rate limit; without creds the single
      # mirror pull below runs unauthenticated from the GitHub runner (off the
      # RunPod IPs that hit the limit). If the unauthenticated pull ever 429s, add
      # DOCKERHUB_USERNAME + DOCKERHUB_TOKEN repo secrets and this step engages.
      # The `secrets` context is NOT allowed in step `if:` conditions, but it IS
      # allowed in `env:`. Surface presence-of-creds as a plain env flag, then gate
      # the login on that. No secret value is ever printed.
      - name: Detect Docker Hub creds
        id: dhcreds
        shell: bash
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          if [ -n "${DOCKERHUB_USERNAME}" ] && [ -n "${DOCKERHUB_TOKEN}" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to Docker Hub (optional, for base mirror)
        if: steps.dhcreds.outputs.present == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Mirror the upstream base into GHCR if not already present, so the build
      # below (and every future build) pulls the base from GHCR, never Docker Hub.
      - name: Mirror base to GHCR
        shell: bash
        run: |
          set -euo pipefail
          UPSTREAM='${{ steps.base.outputs.upstream }}'
          GHCR_BASE="${GHCR_BASE_IMAGE}"
          echo "Checking whether ${GHCR_BASE} already exists in GHCR..."
          if docker manifest inspect "${GHCR_BASE}" >/dev/null 2>&1; then
            echo "GHCR base already present — skipping Docker Hub pull."
          else
            echo "GHCR base missing — pulling ${UPSTREAM} from Docker Hub (one-time mirror)."
            docker pull "${UPSTREAM}"
            docker tag "${UPSTREAM}" "${GHCR_BASE}"
            docker push "${GHCR_BASE}"
            echo "Mirrored ${UPSTREAM} -> ${GHCR_BASE}"
          fi

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=sha,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: images/comfyui-cuda13
          file: images/comfyui-cuda13/Dockerfile
          push: true
          build-args: |
            BASE_IMAGE=${{ env.GHCR_BASE_IMAGE }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
